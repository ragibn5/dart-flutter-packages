name: json_parser_generator
description: Generator counterpart of the `json_parser` package.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/json_parser/json_parser_generator

# This prevents you from accidentally publish to pub.dev
publish_to: 'none'

# Library version
version: 0.0.1

# Range of compatible SDK versions
environment:
  sdk: ^3.10.9

# Add regular dependencies here.
dependencies:
  path: ^1.9.0
  build_config: ^1.3.0
  code_builder: ^4.11.1
  dart_style: ^3.1.2
  mocktail: ^1.0.4
  generator_core:
    path: ../../generator_core
  json_parser_annotations:
    path: ../json_parser_annotations
  functions:
    path: ../../functions

dev_dependencies:
  test: ^1.25.6
  lints: ^6.0.0
  very_good_analysis: ^7.0.0

