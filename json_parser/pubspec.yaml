name: json_parser
description: A lightweight & flexible JSON parser for encoding and decoding data in Dart & Flutter applications.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/json_parser

# This prevents you from accidentally publish to pub.dev
publish_to: 'none'

# Library version
version: 0.0.1

# Range of compatible SDK versions
environment:
  sdk: ^3.0.6

dependencies:
  mocktail: ^1.0.4
  parser:
    path: ../parser

dev_dependencies:
  build_runner: ^2.13.0
  test: ^1.21.0
  lints: ^2.0.0
  very_good_analysis: ^5.1.0
