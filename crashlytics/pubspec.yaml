name: crashlytics
description: A reusable crashlytics service.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/crashlytics

# Library version
version: 1.0.0

# Range of compatible SDK versions
environment:
  sdk: ^3.11.0

# Regular dependencies
# (Bundled in executable artifact)
dependencies:
  flutter:
    sdk: flutter
  firebase_crashlytics: ^4.3.5
  initializable:
    path: ../initializable

# Dev dependencies
# (NOT Bundled in executable artifact - For DEV use only)
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.4
  lints: ^3.0.0
  very_good_analysis: ^5.1.0
