name: json_converters
description: A collection of reusable JSON converter implementations for json_serializable based modules.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/json_converters

# Library version
version: 1.0.0

# Range of compatible SDK versions
environment:
  sdk: ^3.0.6

# Regular dependencies
dependencies:
  datetime_utils:
    path: ../datetime_utils
  json_annotation: ^4.9.0

# Dev dependencies
# (NOT Bundled in executable artifact - For DEV use only)
dev_dependencies:
  flutter_test:
    sdk: flutter
  lints: ^3.0.0
  very_good_analysis: ^5.1.0
