<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dart-Flutter-Packages general checklist</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      max-width: 700px;
      margin: 40px auto;
      padding: 0 20px;
      background: #f5f5f5;
    }
    h1 {
      color: #333;
      border-bottom: 2px solid #0175c2;
      padding-bottom: 10px;
    }
    .progress {
      margin: 20px 0;
      font-size: 14px;
      color: #555;
    }
    .progress-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .progress-title {
      font-weight: 600;
      color: #333;
      border: none;
      background: transparent;
      font-size: inherit;
      font-family: inherit;
      outline: none;
      border-bottom: 1px dashed #ccc;
      padding: 2px 0;
      min-width: 200px;
    }
    .progress-title:focus {
      border-bottom-color: #0175c2;
    }
    .progress-bar {
      width: 100%;
      height: 24px;
      background: #e0e0e0;
      border-radius: 12px;
      overflow: hidden;
      margin-top: 8px;
    }
    .progress-fill {
      height: 100%;
      background: #0175c2;
      border-radius: 12px;
      transition: width 0.3s;
      text-align: center;
      color: #fff;
      font-size: 12px;
      line-height: 24px;
    }
    .group {
      margin: 8px 0 4px 0;
      background: #fff;
      border-radius: 6px;
      overflow: hidden;
    }
    .group-header {
      display: flex;
      align-items: center;
      padding: 10px 14px;
      cursor: pointer;
      font-weight: 600;
      user-select: none;
    }
    .group-header:hover {
      background: #e8f4fd;
    }
    .group-header .arrow {
      margin-right: 8px;
      transition: transform 0.2s;
      font-size: 12px;
      color: #888;
    }
    .group-header.open .arrow {
      transform: rotate(90deg);
    }
    .group-children {
      display: none;
      padding: 4px 0 4px 32px;
    }
    .group-header.open + .group-children {
      display: block;
    }
    label {
      display: block;
      padding: 8px 14px;
      margin: 2px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }
    label:hover {
      background: #e8f4fd;
    }
    input[type="checkbox"] {
      margin-right: 10px;
      width: 16px;
      height: 16px;
      vertical-align: middle;
    }
    input[type="checkbox"]:checked + span {
      text-decoration: line-through;
      color: #999;
    }
    .reset {
      padding: 6px 14px;
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    .reset:hover {
      background: #c62828;
    }
  </style>
</head>
<body>
  <h1>Dart Flutter Packages Checklist</h1>
  <div class="progress">
    <div class="progress-header">
      <input class="progress-title" id="progress-title" type="text" value="Packages Completed" />
      <button class="reset" onclick="resetAll()">Reset All</button>
    </div>
    <span id="progress-text">0 / 43 completed</span>
    <div class="progress-bar"><div class="progress-fill" id="progress-fill" style="width: 0%">0%</div></div>
  </div>
  <div id="checklist"></div>

  <script>
    const packages = [
      "alerty",
      "analysis_plugin_test_helper",
      "analysis_server_core",
      "analytics",
      "app_template",
      "app_template/packages/app_logger",
      "app_template/packages/enum_parser",
      "app_template/packages/shared_models",
      "base_auth_interceptor",
      "clean_arch_lint",
      "collection_utils",
      "color_utils",
      "common_widgets",
      "core_models",
      "crashlytics",
      "data_domain_converters",
      "datetime_utils",
      "disposable",
      "dlogger",
      "feature_api_client",
      "file_store",
      "functions",
      "generator_core",
      "initializable",
      "json_converters",
      "json_parser",
      "json_parser/json_parser_analyzer",
      "json_parser/json_parser_annotations",
      "json_parser/json_parser_generator",
      "menu",
      "menu/demo",
      "mutex",
      "nav_router",
      "net_kit",
      "parser",
      "preference_store",
      "radio_group",
      "radio_group/demo",
      "selection_group",
      "selection_group/demo",
      "snacker",
      "sqlite_db",
      "string_extensions"
    ];

    const STORAGE_KEY = "dart_flutter_packages_checklist";
    const TITLE_KEY = "dart_flutter_packages_title";
    const checklist = document.getElementById("checklist");
    const titleInput = document.getElementById("progress-title");

    titleInput.value = localStorage.getItem(TITLE_KEY) || "Packages Completed";
    titleInput.addEventListener("input", () => {
      localStorage.setItem(TITLE_KEY, titleInput.value);
    });

    function buildTree(pkgs) {
      const roots = [];
      const map = {};
      pkgs.forEach(p => {
        const parts = p.split("/");
        const node = { name: parts[parts.length - 1], full: p, children: [] };
        map[p] = node;
      });
      pkgs.forEach(p => {
        const parts = p.split("/");
        if (parts.length === 1) {
          roots.push(map[p]);
        } else {
          const parentPath = parts.slice(0, parts.length - 1).join("/");
          if (map[parentPath]) {
            map[parentPath].children.push(map[p]);
          } else {
            roots.push(map[p]);
          }
        }
      });
      return roots;
    }

    function makeCheckbox(node) {
      const cb = document.createElement("input");
      cb.type = "checkbox";
      cb.id = node.full;
      cb.checked = localStorage.getItem(STORAGE_KEY + "_" + node.full) === "true";
      cb.addEventListener("change", () => {
        localStorage.setItem(STORAGE_KEY + "_" + node.full, cb.checked);
        updateProgress();
      });
      cb.addEventListener("click", e => e.stopPropagation());
      return cb;
    }

    function makeLeaf(node) {
      const label = document.createElement("label");
      label.appendChild(makeCheckbox(node));
      const span = document.createElement("span");
      span.textContent = node.name;
      label.appendChild(span);
      return label;
    }

    function makeGroup(node, container) {
      const group = document.createElement("div");
      group.className = "group";

      const header = document.createElement("div");
      header.className = "group-header open";
      const arrow = document.createElement("span");
      arrow.className = "arrow";
      arrow.innerHTML = "&#9654;";
      header.appendChild(arrow);
      header.appendChild(makeCheckbox(node));
      const nameSpan = document.createElement("span");
      nameSpan.textContent = " " + node.name;
      header.appendChild(nameSpan);
      header.addEventListener("click", () => header.classList.toggle("open"));

      const children = document.createElement("div");
      children.className = "group-children";
      node.children.forEach(c => renderInto(c, children));

      group.appendChild(header);
      group.appendChild(children);
      container.appendChild(group);
    }

    function renderNode(node) {
      if (node.children.length === 0) {
        checklist.appendChild(makeLeaf(node));
      } else {
        makeGroup(node, checklist);
      }
    }

    function renderInto(node, container) {
      if (node.children.length === 0) {
        container.appendChild(makeLeaf(node));
      } else {
        makeGroup(node, container);
      }
    }

    const tree = buildTree(packages);
    tree.forEach(node => renderNode(node));

    function updateProgress() {
      const checked = document.querySelectorAll("#checklist input:checked").length;
      const total = packages.length;
      const pct = Math.round((checked / total) * 100);
      document.getElementById("progress-text").textContent = checked + " / " + total + " completed";
      const fill = document.getElementById("progress-fill");
      fill.style.width = pct + "%";
      fill.textContent = pct + "%";
    }

    function resetAll() {
      if (!confirm("Reset all checkboxes?")) return;
      packages.forEach(pkg => {
        localStorage.removeItem(STORAGE_KEY + "_" + pkg);
      });
      localStorage.removeItem(TITLE_KEY);
      titleInput.value = "Packages Completed";
      document.querySelectorAll("#checklist input[type=checkbox]").forEach(cb => cb.checked = false);
      updateProgress();
    }

    updateProgress();
  </script>
</body>
</html>
