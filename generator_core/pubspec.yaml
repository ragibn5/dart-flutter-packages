name: generator_core
description: Core components to build a custom dart generator package.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/generator_core

# This prevents you from accidentally publish to pub.dev
publish_to: 'none'

# Library version
version: 0.0.1

# Range of compatible SDK versions
environment:
  sdk: ^3.10.9

# Add regular dependencies here.
dependencies:
  intl: any
  path: ^1.9.0
  yaml: ^3.1.3
  analysis_server_plugin: ^0.3.0
  analyzer_plugin: ^0.13.0
  analyzer: ^8.0.0
  mocktail: ^1.0.4
  functions:
    path: ../functions
  dlogger:
    path: ../dlogger

# Dev dependencies
# (NOT Bundled in executable artifact - For DEV use only)
dev_dependencies:
  lints: ^6.0.0
  very_good_analysis: ^7.0.0
  test: ^1.25.6
