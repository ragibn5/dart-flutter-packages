name: preference_store
description: Key-value data store.

repository: https://github.com/Ragibn5/dart-flutter-packages
issue_tracker: https://github.com/Ragibn5/dart-flutter-packages/issues
homepage: https://github.com/Ragibn5/dart-flutter-packages/tree/main/preference_store

# This prevents you from accidentally publish to pub.dev
publish_to: 'none'

# Library version
version: 0.0.1

# Range of compatible SDK versions
environment:
  sdk: ^3.11.0

# Regular dependencies
dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.5.3

# Dev dependencies
# (NOT Bundled in executable artifact - For DEV use only)
dev_dependencies:
  flutter_test:
    sdk: flutter
  mocktail: ^1.0.5
  shared_preferences_platform_interface: ^2.4.2
  lints: ^3.0.0
  very_good_analysis: ^5.1.0
