name: app_template CI

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  check-changes:
    runs-on: ubuntu-latest
    outputs:
      has_changes: ${{ steps.detect.outputs.has_changes }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changes
        id: detect
        run: |
          if ./scripts/git_utils.sh detect_folder_changes app_template; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

  test-coverage:
    needs: check-changes
    if: needs.check-changes.outputs.has_changes == 'true'
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: app_template

    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.9
          cache: true

      - run: dart pub get

      - name: Install lcov
        run: sudo apt-get update && sudo apt-get install -y lcov

      - name: Run tests with coverage
        run: make run-tests-with-coverage

      - name: Process coverage report
        run: make process-coverage-data

      - name: Upload raw coverage data
        uses: actions/upload-artifact@v4
        with:
          name: coverage-lcov
          path: app_template/coverage/lcov.info

      - name: Upload HTML coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: app_template/coverage/html/

      - name: Enforce coverage threshold
        run: make enforce-coverage-threshold
