name: Create release tag

on:
  pull_request:
    types: [closed]
    branches:
      - main

jobs:
  create-release-tag:
    if: >
      github.event.pull_request.merged == true &&
      startsWith(github.event.pull_request.head.ref, 'release/')
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Extract tag from branch name
        id: extract
        run: |
          BRANCH="${{ github.event.pull_request.head.ref }}"
          # release/<package-path>-<version> → <package-path>-<version>
          REST="${BRANCH#release/}"

          # Extract version (last -X.Y.Z)
          if [[ "$REST" =~ ^(.+)-([0-9]+\.[0-9]+\.[0-9]+)$ ]]; then
            PKG_PATH="${BASH_REMATCH[1]}"
            VERSION="${BASH_REMATCH[2]}"
            TAG="${PKG_PATH}-${VERSION}"
          else
            echo "Error: Could not parse branch name"
            exit 1
          fi

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Extracted tag: $TAG"

      - name: Create and push tag
        run: |
          git tag "${{ steps.extract.outputs.tag }}"
          git push origin "${{ steps.extract.outputs.tag }}"
